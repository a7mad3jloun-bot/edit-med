<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f0c29">
  <title>PICU | لوحة تحكم الأدوية</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Icons -->
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
  <link rel="icon" type="image/png" href="icons/icon-192x192.png">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <style>
    :root {
      --bg: #0f0c29;
      --bg-gradient: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      --card: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.12);
      --text: #e8e6f0;
      --text-muted: #a09ec0;
      --accent: #00d4ff;
      --accent-glow: rgba(0, 212, 255, 0.3);
      --accent2: #ff6b9d;
      --accent2-glow: rgba(255, 107, 157, 0.3);
      --danger: #ff4757;
      --danger-glow: rgba(255, 71, 87, 0.3);
      --warning: #ffa502;
      --warning-glow: rgba(255, 165, 2, 0.3);
      --success: #2ed573;
      --success-glow: rgba(46, 213, 115, 0.3);
      --info: #70a1ff;
      --info-glow: rgba(112, 161, 255, 0.3);
      --purple: #a855f7;
      --purple-glow: rgba(168, 85, 247, 0.3);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      background-image: 
        radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(255, 107, 157, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(168, 85, 247, 0.05) 0%, transparent 70%);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      height: 100vh; 
      display: flex; 
      justify-content: center; 
      align-items: flex-start; 
      direction: rtl;
      overflow: hidden;
    }

    .app-container {
      width: 100%; 
      max-width: 800px; 
      height: 100vh; 
      display: flex; 
      flex-direction: column;
      overflow: hidden; 
      position: relative;
      background: rgba(15, 12, 41, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    /* Header */
    .app-header {
      padding: 16px 20px 8px;
      text-align: center;
      border-bottom: 1px solid var(--card-border);
      background: linear-gradient(180deg, rgba(0,212,255,0.05) 0%, transparent 100%);
    }
    .app-header h1 {
      font-size: 1.3rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }
    .app-header p {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .main-content {
      flex: 1; 
      overflow-y: auto; 
      padding: 16px; 
      padding-bottom: 100px;
      -webkit-overflow-scrolling: touch;
    }

    .page { display: none; flex-direction: column; gap: 16px; }
    .page.active { display: flex; }

    /* Cards with glass effect */
    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 20px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 
        0 12px 40px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .card-header {
      font-size: 1rem; 
      font-weight: 700; 
      margin-bottom: 16px;
      padding-bottom: 12px; 
      border-bottom: 1px solid var(--card-border);
      display: flex; 
      align-items: center; 
      gap: 8px;
      color: var(--accent);
      text-shadow: 0 0 20px var(--accent-glow);
    }

    label { 
      display: block; 
      font-size: 0.8rem; 
      font-weight: 600; 
      color: var(--text-muted); 
      margin-bottom: 6px; 
    }

    input, select, textarea {
      width: 100%; 
      padding: 14px 16px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--card-border);
      border-radius: 16px; 
      color: white; 
      font-size: 0.9rem; 
      margin-bottom: 14px;
      -webkit-appearance: none;
      transition: all 0.3s ease;
    }
    input:focus, select:focus, textarea:focus { 
      border-color: var(--accent); 
      box-shadow: 0 0 0 3px var(--accent-glow), 0 0 20px var(--accent-glow);
      outline: none; 
      background: rgba(0, 0, 0, 0.5);
    }

    /* Buttons */
    button {
      background: linear-gradient(135deg, var(--accent), #0099cc);
      color: #000; 
      border: none; 
      padding: 14px 20px;
      border-radius: 16px; 
      font-weight: 700; 
      font-size: 0.9rem; 
      cursor: pointer; 
      transition: all 0.3s ease;
      width: 100%; 
      margin-bottom: 10px;
      position: relative;
      overflow: hidden;
    }
    button::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }
    button:hover::before { left: 100%; }
    button:hover { 
      transform: translateY(-2px);
      box-shadow: 0 8px 25px var(--accent-glow);
    }
    button:active { transform: translateY(0); }

    button.danger { 
      background: linear-gradient(135deg, var(--danger), #ff3838);
      color: white; 
    }
    button.danger:hover { box-shadow: 0 8px 25px var(--danger-glow); }

    button.warning { 
      background: linear-gradient(135deg, var(--warning), #ff9500);
      color: #000; 
    }
    button.warning:hover { box-shadow: 0 8px 25px var(--warning-glow); }

    button.outline { 
      background: transparent; 
      border: 2px solid var(--accent);
      color: var(--accent);
    }
    button.outline:hover {
      background: var(--accent-glow);
      box-shadow: 0 8px 25px var(--accent-glow);
    }

    button.purple {
      background: linear-gradient(135deg, var(--purple), #7c3aed);
      color: white;
    }
    button.purple:hover { box-shadow: 0 8px 25px var(--purple-glow); }

    button.small { 
      padding: 8px 14px; 
      font-size: 0.75rem; 
      width: auto; 
      margin-bottom: 4px;
      border-radius: 12px;
    }

    .btn-row { 
      display: flex; 
      gap: 10px; 
      flex-wrap: wrap; 
    }
    .btn-row button { flex: 1; min-width: 70px; }

    /* Status messages */
    .status { 
      padding: 14px; 
      border-radius: 14px; 
      font-size: 0.85rem; 
      margin-top: 12px;
      font-weight: 600;
      border: 1px solid transparent;
      backdrop-filter: blur(10px);
    }
    .success { 
      background: rgba(46, 213, 115, 0.15); 
      color: var(--success);
      border-color: rgba(46, 213, 115, 0.3);
      box-shadow: 0 0 20px var(--success-glow);
    }
    .error { 
      background: rgba(255, 71, 87, 0.15); 
      color: var(--danger);
      border-color: rgba(255, 71, 87, 0.3);
      box-shadow: 0 0 20px var(--danger-glow);
    }
    .info { 
      background: rgba(112, 161, 255, 0.15); 
      color: var(--info);
      border-color: rgba(112, 161, 255, 0.3);
      box-shadow: 0 0 20px var(--info-glow);
    }
    .warning-status {
      background: rgba(255, 165, 2, 0.15);
      color: var(--warning);
      border-color: rgba(255, 165, 2, 0.3);
      box-shadow: 0 0 20px var(--warning-glow);
    }

    .hidden { display: none !important; }

    /* Tables */
    table { 
      width: 100%; 
      border-collapse: collapse; 
      font-size: 0.8rem; 
    }
    th { 
      background: rgba(0, 212, 255, 0.1); 
      padding: 12px 10px; 
      text-align: right; 
      position: sticky; 
      top: 0; 
      z-index: 5;
      color: var(--accent);
      font-weight: 700;
      border-bottom: 2px solid var(--accent);
    }
    td { 
      padding: 12px 10px; 
      border-bottom: 1px solid var(--card-border);
      transition: background 0.2s;
    }
    tr:hover td { background: rgba(0, 212, 255, 0.05); }

    .table-wrap { 
      max-height: 45vh; 
      overflow: auto; 
      border-radius: 16px; 
      border: 1px solid var(--card-border);
      background: rgba(0, 0, 0, 0.2);
    }

    /* Entry cards */
    .entry-card { 
      background: rgba(0, 0, 0, 0.3); 
      border: 1px solid var(--card-border); 
      border-radius: 16px; 
      padding: 16px; 
      margin-bottom: 12px;
      transition: all 0.3s ease;
    }
    .entry-card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 20px rgba(0, 212, 255, 0.1);
    }
    .entry-card h4 { 
      color: var(--accent2); 
      margin-bottom: 12px; 
      font-size: 0.9rem;
      text-shadow: 0 0 10px var(--accent2-glow);
    }

    .grid-2 { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 12px; 
    }

    @media (max-width: 450px) { 
      .grid-2 { grid-template-columns: 1fr; } 
      .bottom-nav button .icon { font-size: 1.2rem; } 
    }

    /* Bottom Navigation */
    .bottom-nav {
      display: flex; 
      background: rgba(15, 12, 41, 0.95);
      border-top: 1px solid var(--card-border);
      position: fixed; 
      bottom: 0; 
      left: 50%; 
      transform: translateX(-50%);
      width: 100%; 
      max-width: 800px; 
      z-index: 1000; 
      padding: 8px 4px;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .bottom-nav button {
      flex: 1; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center;
      background: transparent; 
      border: none; 
      color: var(--text-muted); 
      font-size: 0.7rem; 
      font-weight: 600;
      gap: 4px; 
      padding: 8px 4px; 
      transition: all 0.3s ease; 
      cursor: pointer;
      margin-bottom: 0;
    }
    .bottom-nav button .icon { 
      font-size: 1.4rem; 
      transition: transform 0.3s ease;
    }
    .bottom-nav button.active { 
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent-glow);
    }
    .bottom-nav button.active .icon {
      transform: translateY(-2px);
      filter: drop-shadow(0 0 8px var(--accent-glow));
    }
    .bottom-nav button:hover { color: var(--accent); }

    /* Modals */
    .modal-overlay { 
      position: fixed; 
      top:0; left:0; right:0; bottom:0; 
      background: rgba(0,0,0,0.9); 
      z-index:2000; 
      display:none; 
      flex-direction:column; 
      padding:16px; 
      overflow-y:auto;
      backdrop-filter: blur(10px);
    }
    .modal-overlay.show { display:flex; }
    .modal-content { 
      max-width:600px; 
      width:100%; 
      margin:auto; 
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 24px;
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    .modal-buttons { 
      display:flex; 
      gap:12px; 
      margin-top:20px; 
    }
    .modal-buttons button { flex:1; }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .page.active { animation: fadeIn 0.4s ease; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 var(--accent-glow); }
      50% { box-shadow: 0 0 0 10px transparent; }
    }
    .pulse { animation: pulse 2s infinite; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent2); }

    /* Install prompt */
    .install-prompt {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, var(--purple), var(--accent));
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-weight: 700;
      z-index: 3000;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(168, 85, 247, 0.4);
      display: none;
      animation: fadeIn 0.5s ease;
      border: none;
      width: auto;
    }
    .install-prompt.show { display: block; }
  </style>
</head>
<body>
<div class="app-container">
  <div class="app-header">
    <h1>💊 PICU Med Manager</h1>
    <p>لوحة تحكم الأدوية المتقدمة</p>
  </div>

  <div class="main-content" id="mainContent">
    <!-- صفحة الرئيسية -->
    <div id="page-home" class="page active">
      <div class="card">
        <div class="card-header">⚙️ الإعدادات</div>
        <label>🔑 GitHub Token</label>
        <input type="password" id="tokenInput" placeholder="ghp_...">
        <label>🔒 كلمة المرور الجديدة (اختياري)</label>
        <input type="password" id="newPasswordInput" placeholder="اتركه فارغًا إن لم ترد التغيير">
        <div class="btn-row">
          <button onclick="saveToken()">💾 حفظ الرمز</button>
          <button onclick="changePassword()" class="warning">🔄 تغيير كلمة المرور</button>
        </div>
        <div id="tokenStatus" class="status"></div>
      </div>
      <div class="card">
        <div class="card-header">📥 البيانات</div>
        <button onclick="loadFromGitHub()">☁️ تحميل من GitHub</button>
        <button onclick="restoreBackup()" class="outline">🔄 استرجاع نسخة محلية</button>
        <button onclick="saveLocalBackup()" class="outline">💾 حفظ نسخة محلية</button>
        <div id="loadStatus" class="status"></div>
        <div id="counter" class="info hidden"></div>
      </div>
    </div>

    <!-- صفحة الأدوية -->
    <div id="page-drugs" class="page">
      <div class="card">
        <div class="card-header">📋 قائمة الأدوية</div>
        <input type="text" id="searchInput" placeholder="🔍 ابحث عن دواء..." oninput="filterTable()">
        <div id="tableContainer" class="table-wrap">
          <table id="dataTable">
            <thead><tr><th>#</th><th>الدواء</th><th>الاستخدامات</th><th>تعديل</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- صفحة الإضافة -->
    <div id="page-add" class="page">
      <div class="card">
        <div class="card-header">➕ إضافة دواء جديد</div>
        <div class="grid-2">
          <div><label>اسم الدواء *</label><input id="addName" placeholder="مثال: Paracetamol"></div>
          <div><label>الاستطباب</label><input id="addIndication" placeholder="مثال: حمى، ألم"></div>
          <div><label>الفئة العمرية</label><input id="addAgeGroup" placeholder="مثال: >3 سنوات"></div>
          <div><label>الوحدة</label><input id="addUnit" placeholder="مثال: mg/kg"></div>
          <div><label>الجرعة الدنيا</label><input type="number" id="addMinDose" step="any" placeholder="0"></div>
          <div><label>الجرعة القصوى</label><input type="number" id="addMaxDose" step="any" placeholder="0"></div>
          <div><label>مستمر؟</label><select id="addIsContinuous"><option value="false">لا</option><option value="true">نعم</option></select></div>
          <div><label>طريقة الإعطاء</label><input id="addRoute" placeholder="مثال: IV, PO"></div>
        </div>
        <div><label>ملاحظات</label><input id="addDisplayNote" placeholder="ملاحظات إضافية..."></div>
        <button onclick="saveNewDrug()">💾 حفظ الدواء</button>
        <div id="addStatus" class="status"></div>
      </div>
    </div>

    <!-- صفحة الأدوات -->
    <div id="page-tools" class="page">
      <div class="card">
        <div class="card-header">🛠️ أدوات متقدمة</div>
        <button onclick="showValidator()" class="purple">🔍 تدقيق البيانات</button>
        <button onclick="showChangeLog()" class="purple">📋 سجل التغييرات</button>
        <button onclick="exportJSON()" class="outline">📥 تصدير JSON</button>
      </div>
      <div class="card">
        <div class="card-header">👁️ معاينة التطبيق</div>
        <button onclick="uploadAppHTML()">📂 تحميل ملف HTML للتطبيق</button>
        <button onclick="previewInApp()" class="outline">👁️ معاينة مباشرة</button>
      </div>
    </div>

    <!-- صفحة الرفع -->
    <div id="page-upload" class="page">
      <div class="card">
        <div class="card-header">☁️ رفع إلى GitHub</div>
        <p style="color:var(--text-muted); margin-bottom:16px; font-size:0.85rem;">تأكد من تحميل البيانات أولاً قبل الرفع.</p>
        <button onclick="requestUpload()" style="font-size:1.1rem; padding:18px;" class="pulse">🔐 تشفير ورفع</button>
        <div id="uploadStatus" class="status"></div>
      </div>
    </div>
  </div>

  <!-- شريط التنقل السفلي -->
  <div class="bottom-nav">
    <button id="nav-home" class="active" onclick="switchTab('home')"><span class="icon">🏠</span> الرئيسية</button>
    <button id="nav-drugs" onclick="switchTab('drugs')"><span class="icon">📋</span> الأدوية</button>
    <button id="nav-add" onclick="switchTab('add')"><span class="icon">➕</span> إضافة</button>
    <button id="nav-tools" onclick="switchTab('tools')"><span class="icon">🛠️</span> أدوات</button>
    <button id="nav-upload" onclick="switchTab('upload')"><span class="icon">☁️</span> رفع</button>
  </div>
</div>

<!-- زر تثبيت التطبيق -->
<button class="install-prompt" id="installBtn" onclick="installApp()">📲 تثبيت التطبيق</button>

<!-- مودال تعديل الدواء -->
<div id="editModal" class="modal-overlay">
  <div class="modal-content">
    <h3 style="color:var(--accent); margin-bottom:20px; text-shadow: 0 0 10px var(--accent-glow);">✏️ تعديل الاستخدامات</h3>
    <div id="editEntries"></div>
    <div class="modal-buttons">
      <button onclick="addNewEntryToModal()">➕ استخدام جديد</button>
      <button onclick="saveAllEntries()">💾 حفظ الكل</button>
      <button onclick="closeModal()" class="danger">إلغاء</button>
    </div>
  </div>
</div>

<!-- مودال المدقق -->
<div id="validatorModal" class="modal-overlay">
  <div class="modal-content">
    <h3 style="color:var(--accent); margin-bottom:20px; text-shadow: 0 0 10px var(--accent-glow);">🔍 نتائج التدقيق</h3>
    <div id="validatorContent"></div>
    <button onclick="document.getElementById('validatorModal').classList.remove('show')">إغلاق</button>
  </div>
</div>

<!-- مودال سجل التغييرات -->
<div id="changeLogModal" class="modal-overlay">
  <div class="modal-content" style="max-width:500px;">
    <h3 style="color:var(--accent); margin-bottom:20px; text-shadow: 0 0 10px var(--accent-glow);">📝 سجل التغييرات</h3>
    <div id="changeLogContent"></div>
    <button onclick="document.getElementById('changeLogModal').classList.remove('show')">إغلاق</button>
  </div>
</div>

<script>
const OWNER = 'a7mad3jloun-bot';
const REPO = 'PICU-med';
const FILE_PATH = 'medications.enc';
const ENCRYPTION_KEY = 'AHMAD_MASTER_2026';
const DEFAULT_PASSWORD = '@Ahmad1988';
const PASSWORD_SALT = 'picu_final_salt';
const STORAGE_PREFIX = 'picu_final_';

let medicationsData = null;
let changeLog = [];
let appHTMLContent = null;
let currentEditDrugName = null;
let deferredPrompt = null;

// ========== PWA Install ==========
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtn').classList.add('show');
});

async function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') {
    document.getElementById('installBtn').classList.remove('show');
  }
  deferredPrompt = null;
}

// ========== Service Worker Registration ==========
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.log('SW registration failed:', err));
  });
}

// ========== التنقل ==========
function switchTab(name) {
  document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('nav-' + name).classList.add('active');
  document.getElementById('page-' + name).classList.add('active');
  if (name === 'drugs' && medicationsData) renderTable();
}

// ========== كلمة المرور ==========
function hashPassword(pw) { return CryptoJS.SHA256(pw + PASSWORD_SALT).toString(); }
function getStoredPasswordHash() { return localStorage.getItem(STORAGE_PREFIX + 'password') || hashPassword(DEFAULT_PASSWORD); }
function changePassword() {
  const newPw = document.getElementById('newPasswordInput').value.trim();
  if (!newPw || newPw.length < 4) { 
    showStatus('tokenStatus', 'كلمة المرور 4 أحرف على الأقل', 'error'); 
    return; 
  }
  localStorage.setItem(STORAGE_PREFIX + 'password', hashPassword(newPw));
  document.getElementById('newPasswordInput').value = '';
  showStatus('tokenStatus', '✅ تم تغيير كلمة المرور', 'success');
}
function verifyPassword() {
  const stored = getStoredPasswordHash();
  const input = prompt('أدخل كلمة المرور للمتابعة:');
  return input && hashPassword(input) === stored;
}

// ========== Token ==========
function getToken() { return localStorage.getItem(STORAGE_PREFIX + 'token') || ''; }
function saveToken() {
  const t = document.getElementById('tokenInput').value.trim();
  if (t) {
    localStorage.setItem(STORAGE_PREFIX + 'token', t);
    showStatus('tokenStatus', '✅ تم حفظ الرمز بنجاح', 'success');
  }
}

// ========== Helper ==========
function showStatus(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'status ' + type;
  setTimeout(() => { el.className = 'status hidden'; }, 5000);
}

// ========== تحميل ==========
async function loadFromGitHub() {
  const token = getToken();
  if (!token) { 
    showStatus('loadStatus', '❌ أدخل رمز GitHub أولاً', 'error'); 
    return; 
  }
  showStatus('loadStatus', '⏳ جار التحميل من GitHub...', 'info');
  try {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`, {
      headers: { Authorization: `token ${token}` }
    });
    if (!res.ok) throw new Error('خطأ: ' + res.status);
    const data = await res.json();
    const dec = CryptoJS.AES.decrypt(atob(data.content), ENCRYPTION_KEY);
    const json = dec.toString(CryptoJS.enc.Utf8);
    if (!json) throw new Error('فشل فك التشفير – تأكد من المفتاح');
    medicationsData = JSON.parse(json);
    saveBackup();
    showStatus('loadStatus', `✅ تم تحميل ${medicationsData.length} إدخال`, 'success');
    document.getElementById('counter').textContent = `📊 عدد الإدخالات: ${medicationsData.length}`;
    document.getElementById('counter').classList.remove('hidden');
    renderTable();
  } catch(e) { 
    showStatus('loadStatus', '❌ ' + e.message, 'error'); 
  }
}

function saveBackup() { 
  if (medicationsData) localStorage.setItem(STORAGE_PREFIX + 'backup', JSON.stringify(medicationsData)); 
}

function restoreBackup() {
  const b = localStorage.getItem(STORAGE_PREFIX + 'backup');
  if (!b) { 
    showStatus('loadStatus', '❌ لا توجد نسخة محلية', 'error'); 
    return; 
  }
  if (!confirm('استرجاع آخر نسخة محلية؟')) return;
  medicationsData = JSON.parse(b); 
  renderTable(); 
  showStatus('loadStatus', '✅ تم الاسترجاع بنجاح', 'success');
}

function saveLocalBackup() {
  if (!medicationsData) { 
    showStatus('loadStatus', '❌ لا توجد بيانات', 'error'); 
    return; 
  }
  localStorage.setItem(STORAGE_PREFIX + 'backup', JSON.stringify(medicationsData));
  showStatus('loadStatus', '✅ تم حفظ نسخة محلية', 'success');
}

// ========== عرض الأدوية ==========
function renderTable(filter = '') {
  if (!medicationsData) return;
  const grouped = {};
  medicationsData.forEach(m => {
    const name = m.drug_name || 'غير معروف';
    if (!grouped[name]) grouped[name] = [];
    grouped[name].push(m);
  });
  const term = filter.toLowerCase();
  let entries = Object.entries(grouped);
  if (term) entries = entries.filter(([name]) => name.toLowerCase().includes(term));
  const tbody = document.querySelector('#dataTable tbody');
  tbody.innerHTML = entries.map(([name, uses], i) => `
    <tr><td>${i+1}</td><td><strong>${name}</strong></td><td>${uses.length} استخدام</td>
    <td><button class="small" onclick='openEditModal(${JSON.stringify(name)})'>✏️ تعديل</button></td></tr>
  `).join('');
}

function filterTable() { renderTable(document.getElementById('searchInput').value); }

// ========== إضافة دواء ==========
function saveNewDrug() {
  if (!medicationsData) { 
    showStatus('addStatus', '❌ حمّل البيانات أولاً', 'error'); 
    return; 
  }
  const name = document.getElementById('addName').value.trim();
  if (!name) { 
    showStatus('addStatus', '❌ اسم الدواء مطلوب', 'error'); 
    return; 
  }
  medicationsData.push({
    drug_name: name,
    indication: document.getElementById('addIndication').value.trim(),
    age_group: document.getElementById('addAgeGroup').value.trim(),
    unit: document.getElementById('addUnit').value.trim(),
    min_dose: parseFloat(document.getElementById('addMinDose').value) || 0,
    max_dose: parseFloat(document.getElementById('addMaxDose').value) || 0,
    is_continuous: document.getElementById('addIsContinuous').value === 'true',
    route: document.getElementById('addRoute').value.trim(),
    display_note: document.getElementById('addDisplayNote').value.trim()
  });
  saveBackup(); 
  addChange('إضافة', name, 'تمت إضافة الدواء');
  showStatus('addStatus', '✅ تمت الإضافة بنجاح', 'success');
  ['addName','addIndication','addAgeGroup','addUnit','addRoute','addDisplayNote'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('addMinDose').value = ''; 
  document.getElementById('addMaxDose').value = '';
}

// ========== تعديل ==========
function openEditModal(drugName) {
  currentEditDrugName = drugName;
  const entries = medicationsData.filter(m => m.drug_name === drugName);
  const container = document.getElementById('editEntries');
  container.innerHTML = entries.map((e, i) => `
    <div class="entry-card"><h4>استخدام #${i+1}</h4>
    <div class="grid-2">
      <div><label>اسم الدواء</label><input class="ed-name" value="${e.drug_name||''}"></div>
      <div><label>الاستطباب</label><input class="ed-ind" value="${e.indication||''}"></div>
      <div><label>الفئة العمرية</label><input class="ed-age" value="${e.age_group||''}"></div>
      <div><label>الوحدة</label><input class="ed-unit" value="${e.unit||''}"></div>
      <div><label>الجرعة الدنيا</label><input type="number" class="ed-min" value="${e.min_dose??''}" step="any"></div>
      <div><label>الجرعة القصوى</label><input type="number" class="ed-max" value="${e.max_dose??''}" step="any"></div>
      <div><label>مستمر؟</label><select class="ed-cont"><option value="false" ${!e.is_continuous?'selected':''}>لا</option><option value="true" ${e.is_continuous?'selected':''}>نعم</option></select></div>
      <div><label>طريقة الإعطاء</label><input class="ed-route" value="${e.route||''}"></div>
      <div style="grid-column:1/-1;"><label>ملاحظات</label><input class="ed-note" value="${e.display_note||''}"></div>
    </div>
    <button class="danger small" onclick="this.closest('.entry-card').remove()">🗑️ حذف هذا الاستخدام</button></div>
  `).join('');
  document.getElementById('editModal').classList.add('show');
}

function addNewEntryToModal() {
  const div = document.createElement('div');
  div.className = 'entry-card';
  div.innerHTML = `<h4>استخدام جديد</h4><div class="grid-2">
    <div><label>اسم الدواء</label><input class="ed-name" value="${currentEditDrugName||''}"></div>
    <div><label>الاستطباب</label><input class="ed-ind"></div>
    <div><label>الفئة العمرية</label><input class="ed-age"></div>
    <div><label>الوحدة</label><input class="ed-unit"></div>
    <div><label>الجرعة الدنيا</label><input type="number" class="ed-min" step="any"></div>
    <div><label>الجرعة القصوى</label><input type="number" class="ed-max" step="any"></div>
    <div><label>مستمر؟</label><select class="ed-cont"><option value="false">لا</option><option value="true">نعم</option></select></div>
    <div><label>طريقة الإعطاء</label><input class="ed-route"></div>
    <div style="grid-column:1/-1;"><label>ملاحظات</label><input class="ed-note"></div>
  </div><button class="danger small" onclick="this.closest('.entry-card').remove()">🗑️ حذف</button>`;
  document.getElementById('editEntries').appendChild(div);
}

function saveAllEntries() {
  if (!currentEditDrugName) return;
  const cards = document.querySelectorAll('#editEntries .entry-card');
  const newEntries = []; 
  let nameChanged = false; 
  let newName = currentEditDrugName;
  cards.forEach(card => {
    const name = card.querySelector('.ed-name')?.value?.trim();
    if (!name) return;
    if (name !== currentEditDrugName) { nameChanged = true; newName = name; }
    newEntries.push({
      drug_name: name, 
      indication: card.querySelector('.ed-ind')?.value?.trim() || '',
      age_group: card.querySelector('.ed-age')?.value?.trim() || '',
      unit: card.querySelector('.ed-unit')?.value?.trim() || '',
      min_dose: parseFloat(card.querySelector('.ed-min')?.value) || 0,
      max_dose: parseFloat(card.querySelector('.ed-max')?.value) || 0,
      is_continuous: card.querySelector('.ed-cont')?.value === 'true',
      route: card.querySelector('.ed-route')?.value?.trim() || '',
      display_note: card.querySelector('.ed-note')?.value?.trim() || ''
    });
  });
  if (newEntries.length === 0) { alert('يجب وجود إدخال واحد على الأقل'); return; }
  if (nameChanged) {
    if (confirm(`اسم الدواء تغير من "${currentEditDrugName}" إلى "${newName}".\n\nاضغط "موافق" لتغيير الاسم في جميع الإدخالات.\nاضغط "إلغاء" لتغيير هذا الإدخال فقط.`)) {
      newEntries.forEach(e => e.drug_name = newName);
    }
  }
  medicationsData = medicationsData.filter(m => m.drug_name !== currentEditDrugName);
  medicationsData.push(...newEntries);
  saveBackup(); 
  addChange('تعديل', newName, `تم تعديل ${newEntries.length} استخدامات`);
  renderTable(); 
  closeModal();
}

function closeModal() { document.getElementById('editModal').classList.remove('show'); }

// ========== رفع ==========
function requestUpload() {
  if (!getToken()) { 
    showStatus('uploadStatus', '❌ أدخل رمز GitHub أولاً', 'error'); 
    return; 
  }
  if (!medicationsData) { 
    showStatus('uploadStatus', '❌ حمّل البيانات أولاً', 'error'); 
    return; 
  }
  if (!verifyPassword()) { 
    showStatus('uploadStatus', '❌ كلمة مرور خاطئة', 'error'); 
    return; 
  }
  encryptAndUpload();
}

async function encryptAndUpload() {
  const token = getToken();
  showStatus('uploadStatus', '⏳ جار التشفير والرفع...', 'info');
  try {
    const enc = CryptoJS.AES.encrypt(JSON.stringify(medicationsData), ENCRYPTION_KEY).toString();
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`, {
      headers: { Authorization: `token ${token}` }
    });
    if (!res.ok) throw new Error('فشل القراءة');
    const { sha } = await res.json();
    const put = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE_PATH}`, {
      method: 'PUT',
      headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'تحديث medications.enc', content: btoa(enc), sha })
    });
    if (!put.ok) throw new Error('فشل الرفع');
    showStatus('uploadStatus', '✅ تم التشفير والرفع بنجاح!', 'success');
  } catch(e) { 
    showStatus('uploadStatus', '❌ ' + e.message, 'error'); 
  }
}

// ========== سجل ==========
function addChange(type, drug, detail) {
  changeLog.unshift({ time: new Date().toLocaleString('ar-SA'), type, drug, detail });
  if (changeLog.length > 200) changeLog = changeLog.slice(0, 200);
  localStorage.setItem(STORAGE_PREFIX + 'change_log', JSON.stringify(changeLog));
}

function showChangeLog() {
  const c = document.getElementById('changeLogContent');
  changeLog = JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'change_log') || '[]');
  c.innerHTML = changeLog.length ? changeLog.map(l => 
    `<p style="padding:8px; border-bottom:1px solid var(--card-border); margin-bottom:4px;">
      <span style="color:var(--accent); font-weight:700;">${l.time}</span><br>
      <strong>${l.type}:</strong> ${l.drug} - ${l.detail}
    </p>`
  ).join('') : '<p style="color:var(--text-muted);">لا توجد تغييرات مسجلة</p>';
  document.getElementById('changeLogModal').classList.add('show');
}

// ========== تدقيق ==========
function validateData() {
  const errors = [], warnings = [];
  if (!medicationsData || !medicationsData.length) { errors.push('لا توجد بيانات.'); return { errors, warnings }; }
  medicationsData.forEach((m, i) => {
    const idx = i+1;
    if (!m.drug_name?.trim()) errors.push(`#${idx}: اسم الدواء فارغ`);
    if (m.min_dose == null || isNaN(m.min_dose)) errors.push(`#${idx} (${m.drug_name||'?'}): جرعة دنيا غير صالحة`);
    if (m.max_dose == null || isNaN(m.max_dose)) errors.push(`#${idx} (${m.drug_name||'?'}): جرعة قصوى غير صالحة`);
    if (m.min_dose > m.max_dose) errors.push(`#${idx} (${m.drug_name||'?'}): الدنيا > القصوى`);
    if (m.min_dose < 0 || m.max_dose < 0) errors.push(`#${idx} (${m.drug_name||'?'}): جرعة سالبة`);
    if (!m.unit?.trim()) warnings.push(`#${idx} (${m.drug_name||'?'}): الوحدة فارغة`);
    if (m.is_continuous && m.unit && !m.unit.includes('/min') && !m.unit.includes('/hr'))
      warnings.push(`#${idx} (${m.drug_name||'?'}): مستمر والوحدة لا تحتوي /min أو /hr`);
  });
  return { errors, warnings };
}

function showValidator() {
  if (!medicationsData) { 
    showStatus('loadStatus', '❌ حمّل البيانات أولاً', 'error'); 
    return; 
  }
  const { errors, warnings } = validateData();
  const c = document.getElementById('validatorContent'); 
  let h = '';
  if (!errors.length && !warnings.length) 
    h = '<p style="color:var(--success); font-weight:700; font-size:1.1rem;">✅ جميع البيانات سليمة وممتازة!</p>';
  else {
    if (errors.length) h += '<h3 style="color:var(--danger); margin-bottom:12px;">❌ أخطاء (${errors.length})</h3>' + errors.map(e => `<p style="padding:6px 0; border-bottom:1px solid var(--card-border);">🔴 ${e}</p>`).join('');
    if (warnings.length) h += '<h3 style="color:var(--warning); margin:16px 0 12px;">⚠️ تنبيهات (${warnings.length})</h3>' + warnings.map(w => `<p style="padding:6px 0; border-bottom:1px solid var(--card-border);">🟡 ${w}</p>`).join('');
  }
  c.innerHTML = h; 
  document.getElementById('validatorModal').classList.add('show');
}

// ========== تصدير ==========
function exportJSON() {
  if (!medicationsData) { 
    showStatus('loadStatus', '❌ لا توجد بيانات', 'error'); 
    return; 
  }
  const blob = new Blob([JSON.stringify(medicationsData, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); 
  a.href = URL.createObjectURL(blob); 
  a.download = 'medications_backup_' + new Date().toISOString().slice(0,10) + '.json'; 
  a.click();
}

// ========== معاينة ==========
function uploadAppHTML() {
  const i = document.createElement('input'); 
  i.type = 'file'; 
  i.accept = '.html';
  i.onchange = function(e) {
    const f = e.target.files[0]; 
    if (!f) return;
    const r = new FileReader();
    r.onload = function(ev) {
      appHTMLContent = ev.target.result;
      localStorage.setItem(STORAGE_PREFIX + 'app_html', appHTMLContent);
      showStatus('loadStatus', '✅ تم تحميل نسخة التطبيق', 'success');
    };
    r.readAsText(f);
  };
  i.click();
}

function previewInApp() {
  if (!medicationsData || !appHTMLContent) { 
    showStatus('loadStatus', '❌ حمّل البيانات ونسخة HTML أولاً', 'error'); 
    return; 
  }
  let h = appHTMLContent;
  h = h.replace(/const V11_DATA = \[[\s\S]*?\];/, 'const V11_DATA = ' + JSON.stringify(medicationsData) + ';');
  h = h.replace(/const DATA_URL = ['"][^'"]*['"];/, 'const DATA_URL = "";');
  h = h.replace(/async function loadMedications[\s\S]*?processMedications\(\);\s*\}/m, 'async function loadMedications() { medications = V11_DATA; processMedications(); }');
  window.open(URL.createObjectURL(new Blob([h], { type: 'text/html' })), '_blank');
}

// ========== تهيئة ==========
document.getElementById('tokenInput').value = getToken();
if (getToken()) { 
  showStatus('tokenStatus', '✅ الرمز محفوظ', 'success'); 
}
changeLog = JSON.parse(localStorage.getItem(STORAGE_PREFIX + 'change_log') || '[]');

// Check for saved backup
const savedBackup = localStorage.getItem(STORAGE_PREFIX + 'backup');
if (savedBackup) {
  medicationsData = JSON.parse(savedBackup);
  document.getElementById('counter').textContent = `📊 عدد الإدخالات: ${medicationsData.length}`;
  document.getElementById('counter').classList.remove('hidden');
}
